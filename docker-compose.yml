services:
  web-angular:
    build:
      context: ./web-angular
      dockerfile: Dockerfile
    container_name: verbos-es-gl-web
    ports:
      - "28180:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  web-flutter:
    build:
      context: ./flutter_app
      dockerfile: Dockerfile
    container_name: verbos-es-gl-flutter-web
    ports:
      - "28181:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
