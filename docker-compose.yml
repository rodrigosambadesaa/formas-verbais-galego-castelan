services:
  web-angular:
    build:
      context: ./web-angular
      dockerfile: Dockerfile
    container_name: verbos-es-gl-web
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  web-flutter:
    build:
      context: ./web-flutter
      dockerfile: Dockerfile
    container_name: verbos-es-gl-flutter
    ports:
      - "8081:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
